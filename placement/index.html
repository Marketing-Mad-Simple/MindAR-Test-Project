<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; }

      #camera-feed {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        z-index: 0;
      }

      a-scene {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 1;
      }

      #loading-screen {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        color: white;
        font-family: Arial, sans-serif;
      }
      #loading-screen h2 {
        margin-bottom: 20px;
        font-size: 1.2rem;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      #progress-bar-container {
        width: 60%;
        background: #333;
        border-radius: 10px;
        overflow: hidden;
        height: 8px;
      }
      #progress-bar {
        height: 100%;
        width: 0%;
        background: white;
        border-radius: 10px;
        transition: width 0.3s ease;
      }
      #progress-text {
        margin-top: 12px;
        font-size: 0.85rem;
        color: #aaa;
      }
      #controls-hint {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.55);
        color: white;
        font-family: Arial, sans-serif;
        font-size: 0.78rem;
        padding: 8px 16px;
        border-radius: 20px;
        pointer-events: none;
        z-index: 100;
        white-space: nowrap;
        opacity: 1;
        transition: opacity 1s ease;
      }
    </style>
  </head>
  <body>
    <!-- Camera background -->
    <video id="camera-feed" autoplay playsinline muted></video>

    <!-- Loading Screen -->
    <div id="loading-screen">
      <h2>Loading Experience</h2>
      <div id="progress-bar-container">
        <div id="progress-bar"></div>
      </div>
      <div id="progress-text">0%</div>
    </div>

    <!-- Controls hint -->
    <div id="controls-hint">1 finger: rotate &nbsp;|&nbsp; 2 fingers pinch: scale &nbsp;|&nbsp; 2 fingers pan: move</div>

    <a-scene
          embedded
          renderer="alpha: true; colorManagement: true; physicallyCorrectLights: true"
          gltf-model="dracoDecoderPath: https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/libs/draco/gltf/"
          vr-mode-ui="enabled: false"
          device-orientation-permission-ui="enabled: false">
      <a-assets id="assets" timeout="60000">
        <a-asset-item id="exteriorModel" src="../models/Exterior.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="exterior-entity" position="0 -1 -3" rotation="10 0 0" scale="0.05 0.05 0.05">
        <a-gltf-model src="#exteriorModel"></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      // ── Camera feed ─────────────────────────────────────────────────────────
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
        .then(stream => { document.getElementById('camera-feed').srcObject = stream; })
        .catch(() => { /* camera unavailable — model still shows on plain black */ });

      // ── Loading screen ──────────────────────────────────────────────────────
      const loadingScreen = document.getElementById('loading-screen');
      const progressBar   = document.getElementById('progress-bar');
      const progressText  = document.getElementById('progress-text');
      const exteriorAsset = document.getElementById('exteriorModel');

      let fakeProgress = 0;
      let loaded = false;

      const fakeInterval = setInterval(() => {
        if (fakeProgress < 85) {
          fakeProgress += 0.5;
          progressBar.style.width = fakeProgress + '%';
          progressText.textContent = Math.round(fakeProgress) + '%';
        }
      }, 100);

      function onAssetLoaded() {
        if (loaded) return;
        loaded = true;
        clearInterval(fakeInterval);
        progressBar.style.width = '100%';
        progressText.textContent = '100%';
        setTimeout(() => {
          loadingScreen.style.transition = 'opacity 0.5s ease';
          loadingScreen.style.opacity = '0';
          setTimeout(() => {
            loadingScreen.style.display = 'none';
            setTimeout(() => {
              document.getElementById('controls-hint').style.opacity = '0';
            }, 4000);
          }, 500);
        }, 400);
      }

      exteriorAsset.addEventListener('loaded', onAssetLoaded);
      exteriorAsset.addEventListener('error', onAssetLoaded);

      // ── Touch controls ──────────────────────────────────────────────────────
      const exteriorEl = document.getElementById('exterior-entity');

      let pos   = { x: 0,  y: -1, z: -3 };
      let rot   = { x: 10, y: 0,  z: 0  };
      let scale = 0.05;

      function copyTouches(list) {
        return Array.from(list).map(t => ({ x: t.clientX, y: t.clientY }));
      }

      function dist(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      let prevTouches = null;

      document.addEventListener('touchstart', e => {
        prevTouches = copyTouches(e.touches);
      }, { passive: true });

      document.addEventListener('touchmove', e => {
        e.preventDefault();
        const curr = copyTouches(e.touches);
        if (!prevTouches) { prevTouches = curr; return; }

        if (curr.length === 1 && prevTouches.length === 1) {
          // Single finger → rotate Y
          rot.y += (curr[0].x - prevTouches[0].x) * 0.5;
          exteriorEl.setAttribute('rotation', `${rot.x} ${rot.y} ${rot.z}`);

        } else if (curr.length === 2 && prevTouches.length === 2) {
          // Pinch → scale
          const prevDist = dist(prevTouches[0], prevTouches[1]);
          const currDist = dist(curr[0], curr[1]);
          if (prevDist > 0) {
            scale = Math.max(0.005, Math.min(1.0, scale * (currDist / prevDist)));
            exteriorEl.setAttribute('scale', `${scale} ${scale} ${scale}`);
          }

          // Two-finger pan → translate X / Y
          const prevCx = (prevTouches[0].x + prevTouches[1].x) / 2;
          const prevCy = (prevTouches[0].y + prevTouches[1].y) / 2;
          const currCx = (curr[0].x + curr[1].x) / 2;
          const currCy = (curr[0].y + curr[1].y) / 2;

          pos.x += (currCx - prevCx) * 0.008;
          pos.y -= (currCy - prevCy) * 0.008;
          exteriorEl.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
        }

        prevTouches = curr;
      }, { passive: false });

      document.addEventListener('touchend', e => {
        prevTouches = copyTouches(e.touches);
      }, { passive: true });
    </script>
  </body>
</html>
