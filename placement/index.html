<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Model Placement AR</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { overflow: hidden; background: #000; }

      #camera-feed {
        position: fixed;
        inset: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        z-index: 0;
      }

      canvas {
        position: fixed;
        inset: 0;
        z-index: 1;
      }

      #loading-screen {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        color: white;
        font-family: Arial, sans-serif;
      }
      #loading-screen h2 {
        margin-bottom: 20px;
        font-size: 1.2rem;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      #progress-bar-container {
        width: 60%;
        background: #333;
        border-radius: 10px;
        overflow: hidden;
        height: 8px;
      }
      #progress-bar {
        height: 100%;
        width: 0%;
        background: white;
        border-radius: 10px;
        transition: width 0.2s ease;
      }
      #progress-text {
        margin-top: 12px;
        font-size: 0.85rem;
        color: #aaa;
      }
      #controls-hint {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.55);
        color: white;
        font-family: Arial, sans-serif;
        font-size: 0.78rem;
        padding: 8px 16px;
        border-radius: 20px;
        pointer-events: none;
        z-index: 100;
        white-space: nowrap;
        opacity: 1;
        transition: opacity 1s ease;
      }
    </style>
  </head>
  <body>
    <video id="camera-feed" autoplay playsinline muted></video>

    <div id="loading-screen">
      <h2>Loading Experience</h2>
      <div id="progress-bar-container">
        <div id="progress-bar"></div>
      </div>
      <div id="progress-text">0%</div>
    </div>

    <div id="controls-hint">1 finger: rotate &nbsp;|&nbsp; 2 fingers pinch: scale &nbsp;|&nbsp; 2 fingers pan: move</div>

    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
      }
    }
    </script>

    <script type="module">
      import * as THREE from 'three';
      import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
      import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

      // ── Camera feed ────────────────────────────────────────────────────────
      navigator.mediaDevices
        .getUserMedia({ video: { facingMode: 'environment' }, audio: false })
        .then(stream => { document.getElementById('camera-feed').srcObject = stream; })
        .catch(() => { /* model still shows on plain black if camera is unavailable */ });

      // ── Renderer ───────────────────────────────────────────────────────────
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.useLegacyLights = false;
      document.body.appendChild(renderer.domElement);

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // ── Scene ──────────────────────────────────────────────────────────────
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);

      scene.add(new THREE.AmbientLight(0xffffff, 1.5));
      const sun = new THREE.DirectionalLight(0xffffff, 2);
      sun.position.set(2, 4, 3);
      scene.add(sun);

      // ── Load model ─────────────────────────────────────────────────────────
      const progressBar  = document.getElementById('progress-bar');
      const progressText = document.getElementById('progress-text');
      const loadingScreen = document.getElementById('loading-screen');
      const hint = document.getElementById('controls-hint');

      const dracoLoader = new DRACOLoader();
      dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/libs/draco/gltf/');

      const loader = new GLTFLoader();
      loader.setDRACOLoader(dracoLoader);

      const modelPos = new THREE.Vector3(0, -1, -3);
      let model = null;
      let rotY  = 0;
      let scale = 0.05;

      loader.load(
        '../models/Exterior.glb',
        gltf => {
          model = gltf.scene;
          model.position.copy(modelPos);
          model.rotation.x = THREE.MathUtils.degToRad(10);
          model.scale.setScalar(scale);
          scene.add(model);

          progressBar.style.width = '100%';
          progressText.textContent = '100%';
          setTimeout(() => {
            loadingScreen.style.transition = 'opacity 0.5s ease';
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
              loadingScreen.style.display = 'none';
              setTimeout(() => { hint.style.opacity = '0'; }, 4000);
            }, 500);
          }, 400);
        },
        xhr => {
          if (xhr.total > 0) {
            const pct = Math.min(95, Math.round((xhr.loaded / xhr.total) * 95));
            progressBar.style.width = pct + '%';
            progressText.textContent = pct + '%';
          }
        }
      );

      // ── Render loop ────────────────────────────────────────────────────────
      (function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
      })();

      // ── Touch controls ─────────────────────────────────────────────────────
      function copyTouches(list) {
        return Array.from(list).map(t => ({ x: t.clientX, y: t.clientY }));
      }
      function dist(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      let prevTouches = null;

      document.addEventListener('touchstart', e => {
        prevTouches = copyTouches(e.touches);
      }, { passive: true });

      document.addEventListener('touchmove', e => {
        e.preventDefault();
        if (!model) return;
        const curr = copyTouches(e.touches);
        if (!prevTouches) { prevTouches = curr; return; }

        if (curr.length === 1 && prevTouches.length === 1) {
          // Single finger → rotate Y
          rotY += (curr[0].x - prevTouches[0].x) * THREE.MathUtils.degToRad(0.5);
          model.rotation.y = rotY;

        } else if (curr.length === 2 && prevTouches.length === 2) {
          // Pinch → scale
          const prevD = dist(prevTouches[0], prevTouches[1]);
          const currD = dist(curr[0], curr[1]);
          if (prevD > 0) {
            scale = Math.max(0.005, Math.min(1.0, scale * (currD / prevD)));
            model.scale.setScalar(scale);
          }

          // Two-finger pan → translate X / Y
          const prevCx = (prevTouches[0].x + prevTouches[1].x) / 2;
          const prevCy = (prevTouches[0].y + prevTouches[1].y) / 2;
          const currCx = (curr[0].x + curr[1].x) / 2;
          const currCy = (curr[0].y + curr[1].y) / 2;
          modelPos.x += (currCx - prevCx) * 0.008;
          modelPos.y -= (currCy - prevCy) * 0.008;
          model.position.copy(modelPos);
        }

        prevTouches = curr;
      }, { passive: false });

      document.addEventListener('touchend', e => {
        prevTouches = copyTouches(e.touches);
      }, { passive: true });
    </script>
  </body>
</html>
