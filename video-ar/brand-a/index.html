<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Brand A — AR Experience</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

      #loading-screen {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        z-index: 9999;
        color: white;
        font-family: Arial, sans-serif;
      }
      .spinner {
        width: 40px; height: 40px;
        border: 3px solid rgba(255,255,255,0.2);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #loading-screen p {
        font-size: 0.88rem;
        letter-spacing: 1.5px;
        color: #aaa;
        text-transform: uppercase;
      }

      #hint {
        position: fixed;
        bottom: calc(env(safe-area-inset-bottom, 0px) + 40px);
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.65);
        color: white;
        font-family: Arial, sans-serif;
        font-size: 0.88rem;
        padding: 12px 24px;
        border-radius: 999px;
        pointer-events: none;
        white-space: nowrap;
        z-index: 100;
        display: none;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.1);
      }

      #mute-btn {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 16px);
        right: 16px;
        width: 44px; height: 44px;
        border-radius: 50%;
        border: none;
        background: rgba(0, 0, 0, 0.55);
        color: white;
        font-size: 1.15rem;
        cursor: pointer;
        z-index: 200;
        display: none;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.15);
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
    </style>
  </head>
  <body>

    <div id="loading-screen">
      <div class="spinner"></div>
      <p>Loading AR</p>
    </div>

    <div id="hint">Point camera at the image</div>
    <button id="mute-btn" aria-label="Toggle mute">&#128263;</button>

    <a-scene
      mindar-image="imageTargetSrc: targets.mind; filterMinCF: 0.001; filterBeta: 0.01;"
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <!--
          Target image: Cornitos_AD2.png (941x1672, portrait 9:16)
          Video: video.mp4 (720x1280, portrait 9:16)
          <a-video> height = image_height / image_width = 1672/941 = 1.777
        -->
        <video id="ar-video" src="video.mp4"
          loop muted playsinline webkit-playsinline
          crossorigin="anonymous" preload="auto">
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#ar-video"
          width="1" height="1.777"
          position="0 0 0.001"
          rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl  = document.querySelector('a-scene');
      const videoEl  = document.getElementById('ar-video');
      const loading  = document.getElementById('loading-screen');
      const hint     = document.getElementById('hint');
      const muteBtn  = document.getElementById('mute-btn');
      let muted = true;

      function showAR() {
        loading.style.transition = 'opacity 0.4s ease';
        loading.style.opacity    = '0';
        setTimeout(() => { loading.style.display = 'none'; }, 400);
        hint.style.display   = 'block';
        muteBtn.style.display = 'flex';
      }

      sceneEl.addEventListener('arReady', showAR);

      sceneEl.addEventListener('arError', () => {
        const p = loading.querySelector('p');
        p.textContent = 'Camera access required';
        loading.querySelector('.spinner').style.display = 'none';
      });

      const target = document.querySelector('a-entity[mindar-image-target]');

      target.addEventListener('targetFound', () => {
        videoEl.play().catch(() => {});
        hint.style.display = 'none';
      });

      target.addEventListener('targetLost', () => {
        videoEl.pause();
        hint.style.display = 'block';
      });

      muteBtn.addEventListener('click', () => {
        muted = !muted;
        videoEl.muted = muted;
        muteBtn.innerHTML = muted ? '&#128263;' : '&#128266;';
        if (!muted && videoEl.paused) videoEl.play().catch(() => {});
      });
    </script>
  </body>
</html>
